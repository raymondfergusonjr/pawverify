name = "pawverify-worker"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "pawverify-db"
database_id = "YOUR_D1_DATABASE_ID"

# Routes — serves API calls from your domain
[[routes]]
pattern = "pawverify.org/analyze"
zone_name = "pawverify.org"

[[routes]]
pattern = "pawverify.org/simulate"
zone_name = "pawverify.org"

[[routes]]
pattern = "pawverify.org/register"
zone_name = "pawverify.org"

[[routes]]
pattern = "pawverify.org/report"
zone_name = "pawverify.org"

[[routes]]
pattern = "pawverify.org/health"
zone_name = "pawverify.org"

[vars]
ENVIRONMENT = "production"
